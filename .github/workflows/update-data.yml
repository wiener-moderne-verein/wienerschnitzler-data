name: Update Data from PMB

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Installiere Java, Ant und weitere Abhängigkeiten
        run: |
          ./dl_saxon.sh

      - name: Python einrichten
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Daten aus PMB abrufen
        run: python3 ./python-scripts/fetch-data-from-pmb.py

      - name: Build mit Ant ausführen
        run: ant -f build.xml

      - name: Quelldaten auf main committen
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add input-data data/indices
          if ! git diff --cached --quiet; then
            git commit -m "Update durch Workflow"
            git push
          else
            echo "Keine Änderungen an den Quelldaten, Commit wird übersprungen."
          fi

      - name: Ergebnisdaten auf data-Branch publizieren
        # Der data-Branch besteht immer nur aus einem einzigen Commit
        # (Force-Push), damit die Repository-Historie nicht mit
        # regenerierten Dateien anwächst.
        run: |
          git checkout --orphan data-deploy
          git reset
          git add -f data README.md LICENSE
          git commit -m "Datenstand $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push --force origin data-deploy:data
